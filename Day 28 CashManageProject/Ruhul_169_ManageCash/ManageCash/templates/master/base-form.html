{% extends "master/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
    {% include "master/messages.html" %}
<h1>{{form_title}}</h1>

<form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
  <div class="container">
    {{form_data|crispy}}
</div>

<div class="col-12">
    <button class="btn btn-primary" type="submit">{{form_btn}}</button>
</div>

</form>

</div>


{% endblock content %}
